apiVersion: apps/v1
kind: Deployment
metadata:
  name: basket-api
  labels:
    app: basket-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: basket-api
  template:
    metadata:
      labels:
        app: basket-api
    spec:
      containers:
      - name: basket-api
        image: basket-api:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "300m"
            memory: "256Mi"
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: "Development"
        - name: ASPNETCORE_URLS
          value: "http://+:8080"
        - name: IdentityServerURL
          value: "http://identityserver:8080"
        - name: RedisOptions__Host
          value: "udemy-basket-redis"
        - name: RedisOptions__Port
          value: "6379"
        - name: RedisOptions__UseSentinel
          value: "true"
        - name: RedisOptions__ServiceName
          value: "basket-redis-set"
        - name: RedisOptions__SentinelHosts
          value: "udemy-basket-redis-sentinel"
        - name: RedisOptions__SentinelPort
          value: "26379"
---
apiVersion: v1
kind: Service
metadata:
  name: basket-api
spec:
  type: NodePort
  selector:
    app: basket-api
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
      nodePort: 30013
