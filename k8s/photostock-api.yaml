apiVersion: apps/v1
kind: Deployment
metadata:
  name: photostock-api
  labels:
    app: photostock-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: photostock-api
  template:
    metadata:
      labels:
        app: photostock-api
    spec:
      containers:
      - name: photostock-api
        image: photostock-api:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "300m"
            memory: "256Mi"
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: "Development"
        - name: ASPNETCORE_URLS
          value: "http://+:8080"
        - name: IdentityServerURL
          value: "http://identityserver:8080"
        volumeMounts:
        - name: photostock-photos
          mountPath: /app/wwwroot/photos
      volumes:
      - name: photostock-photos
        persistentVolumeClaim:
          claimName: photostock-photos-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: photostock-api
spec:
  type: NodePort
  selector:
    app: photostock-api
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
      nodePort: 30012
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: photostock-photos-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
