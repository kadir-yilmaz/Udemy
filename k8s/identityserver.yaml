apiVersion: apps/v1
kind: Deployment
metadata:
  name: identityserver
  labels:
    app: identityserver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: identityserver
  template:
    metadata:
      labels:
        app: identityserver
    spec:
      containers:
      - name: identityserver
        image: identityserver:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: "Development"
        - name: ASPNETCORE_URLS
          value: "http://+:8080"
        - name: ConnectionStrings__DefaultConnection
          value: "Data Source=host.docker.internal,1433;Initial Catalog=IdentityDb;User Id=sa;Password=Password12*;TrustServerCertificate=True"
        - name: CONNECTIONSTRINGS__DEFAULTCONNECTION
          value: "Data Source=host.docker.internal,1433;Initial Catalog=IdentityDb;User Id=sa;Password=Password12*;TrustServerCertificate=True"
---
apiVersion: v1
kind: Service
metadata:
  name: identityserver
spec:
  type: NodePort
  selector:
    app: identityserver
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
      nodePort: 30001
