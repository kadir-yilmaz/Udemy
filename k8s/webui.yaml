apiVersion: apps/v1
kind: Deployment
metadata:
  name: webui
  labels:
    app: webui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webui
  template:
    metadata:
      labels:
        app: webui
    spec:
      containers:
      - name: webui
        image: webui:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "300m"
            memory: "512Mi"
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: "Development"
        - name: ASPNETCORE_URLS
          value: "http://+:8080"
        - name: ServiceApiSettings__IdentityBaseUri
          value: "http://identityserver:8080"
        - name: ServiceApiSettings__GatewayBaseUri
          value: "http://gateway:8080"
        - name: ServiceApiSettings__PhotoStockUri
          value: "http://photostock-api:8080"
        - name: ServiceApiSettings__PhotoStockPublicUri
          value: "http://localhost:30012"
        - name: APP_VERSION
          value: "local-dev"
---
apiVersion: v1
kind: Service
metadata:
  name: webui
spec:
  type: NodePort
  selector:
    app: webui
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
      nodePort: 30075
